services:
  bills:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-medium
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-unknown}
    image: ghcr.io/enucatl/bills:latest
    cpu_shares: 512
    extra_hosts:
      - "${DOCKER_DOMAIN}:host-gateway"
    environment:
      - CSRF_TRUSTED_ORIGINS
      - DATABASE_URL=postgres://bills:${POSTGRES_PASSWORD}@db:5432/bills
      - DJANGO_ALLOWED_HOSTS
      - DJANGO_EMAIL_CAFILE=/etc/ssl/certs/ca-certificates.crt
      - DJANGO_EMAIL_HOST
      - DJANGO_EMAIL_HOST_PASSWORD
      - DJANGO_EMAIL_PORT
      - DJANGO_EMAIL_HOST_USER
      - DJANGO_SECRET_KEY
      - DJANGO_SETTINGS_MODULE=send_bills.project.settings.production
      - DJANGO_STATIC_ROOT=/vol/web/staticfiles
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
    restart: unless-stopped
    labels:
      - "checkmk_monitor=true"
      - "traefik.enable=true"
      - "traefik.http.routers.bills.rule=Host(`bills.${DOCKER_DOMAIN}`)"
      - "traefik.http.routers.bills.entrypoints=https"
      - "traefik.http.routers.bills.tls=true"
      - "traefik.http.routers.bills.middlewares=authelia@docker,secured@file"
      - "traefik.http.services.bills.loadbalancer.server.port=8000"
    ports: []
    tmpfs:
      - /tmp:rw,nosuid,noexec,mode=1777,size=16m
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    networks:
      - traefik_proxy
      - default
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-medium
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-unknown}
    image: ghcr.io/enucatl/bills:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      - CSRF_TRUSTED_ORIGINS
      - DATABASE_URL=postgres://bills:${POSTGRES_PASSWORD}@db:5432/bills
      - DJANGO_ALLOWED_HOSTS
      - DJANGO_EMAIL_CAFILE=/etc/ssl/certs/ca-certificates.crt
      - DJANGO_EMAIL_HOST
      - DJANGO_EMAIL_HOST_PASSWORD
      - DJANGO_EMAIL_PORT
      - DJANGO_EMAIL_HOST_USER
      - DJANGO_SECRET_KEY
      - DJANGO_SETTINGS_MODULE=send_bills.project.settings.production
      - DJANGO_STATIC_ROOT=/vol/web/staticfiles
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - >-
        .venv/bin/python src/send_bills/manage.py migrate --noinput &&
        while true; do
          .venv/bin/python src/send_bills/manage.py process_bills;
          sleep 3600;
        done
    restart: unless-stopped
    tmpfs:
      - /tmp:rw,nosuid,noexec,mode=1777,size=16m
    networks:
      - default

  db:
    image: postgres:18
    environment:
      - POSTGRES_DB=bills
      - POSTGRES_USER=bills
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bills -d bills"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - bills_db:/var/lib/postgresql
    networks:
      - default

networks:
  default:
    internal: true
  traefik_proxy:
    external: true
volumes:
  bills_db:
