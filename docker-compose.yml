services:
  bills:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-medium
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-0.0.0}
    image: ghcr.io/enucatl/bills:latest
    cpu_shares: 512
    extra_hosts:
      - "${DOCKER_DOMAIN}:host-gateway"
    environment:
      - CSRF_TRUSTED_ORIGINS
      - DJANGO_ALLOWED_HOSTS
      - DJANGO_EMAIL_CAFILE=/etc/ssl/certs/ca-certificates.crt
      - DJANGO_EMAIL_HOST
      - DJANGO_EMAIL_HOST_PASSWORD_FILE=/run/secrets/django_email_host_password
      - DJANGO_EMAIL_PORT
      - DJANGO_EMAIL_HOST_USER
      - DJANGO_SECRET_KEY_FILE=/run/secrets/django_secret_key
      - DJANGO_SETTINGS_MODULE=send_bills.project.settings.production
      - DJANGO_STATIC_ROOT=/vol/web/staticfiles
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - DATABASE_HOST=db
      - DATABASE_NAME=bills
      - DATABASE_PASSWORD_FILE=/run/secrets/postgres_password
      - DATABASE_PORT=5432
      - DATABASE_USER=bills
    restart: unless-stopped
    labels:
      - "checkmk_monitor=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.enable=true"
      - "traefik.http.routers.bills.rule=Host(`bills.${DOCKER_DOMAIN}`)"
      - "traefik.http.routers.bills.entrypoints=https"
      - "traefik.http.routers.bills.tls=true"
      - "traefik.http.routers.bills.middlewares=authelia@docker,secured@file"
      - "traefik.http.services.bills.loadbalancer.server.port=8000"
    ports: []
    tmpfs:
      - /tmp:rw,nosuid,noexec,mode=1777,size=16m
    volumes:
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    secrets:
      - django_email_host_password
      - django_secret_key
      - postgres_password
    networks:
      - traefik_proxy
      - default
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-medium
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-0.0.0}
    image: ghcr.io/enucatl/bills:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      - CSRF_TRUSTED_ORIGINS
      - DJANGO_ALLOWED_HOSTS
      - DJANGO_EMAIL_CAFILE=/etc/ssl/certs/ca-certificates.crt
      - DJANGO_EMAIL_HOST
      - DJANGO_EMAIL_HOST_PASSWORD_FILE=/run/secrets/django_email_host_password
      - DJANGO_EMAIL_PORT
      - DJANGO_EMAIL_HOST_USER
      - DJANGO_SECRET_KEY_FILE=/run/secrets/django_secret_key
      - DJANGO_SETTINGS_MODULE=send_bills.project.settings.production
      - DJANGO_STATIC_ROOT=/vol/web/staticfiles
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - DATABASE_HOST=db
      - DATABASE_NAME=bills
      - DATABASE_PASSWORD_FILE=/run/secrets/postgres_password
      - DATABASE_PORT=5432
      - DATABASE_USER=bills
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - >-
        .venv/bin/python src/send_bills/manage.py migrate --noinput &&
        while true; do
          .venv/bin/python src/send_bills/manage.py process_bills;
          sleep 3600;
        done
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          ".venv/bin/python -c 'from django.db import connections; connections[\"default\"].cursor()'",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    tmpfs:
      - /tmp:rw,nosuid,noexec,mode=1777,size=16m
    secrets:
      - django_email_host_password
      - django_secret_key
      - postgres_password
    networks:
      - default

  db:
    image: postgres:18
    environment:
      - POSTGRES_DB=bills
      - POSTGRES_USER=bills
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bills -d bills"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - bills_db:/var/lib/postgresql
    secrets:
      - postgres_password
    networks:
      - default

secrets:
  django_email_host_password:
    file: ./secrets/django_email_host_password
  django_secret_key:
    file: ./secrets/django_secret_key
  postgres_password:
    file: ./secrets/postgres_password

networks:
  default:
    internal: true
  traefik_proxy:
    external: true
volumes:
  bills_db:
